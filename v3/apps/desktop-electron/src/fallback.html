<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AGI Voice V3</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #161b22;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #7ee787;
        --line: #30363d;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(126, 231, 135, 0.16), transparent 32%),
          radial-gradient(circle at bottom right, rgba(88, 166, 255, 0.14), transparent 28%),
          var(--bg);
        color: var(--text);
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .card {
        width: min(720px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 28px;
        background: rgba(22, 27, 34, 0.92);
        box-shadow: 0 24px 72px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 14px;
        color: var(--muted);
      }

      code {
        color: var(--accent);
        background: rgba(126, 231, 135, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
      }

      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      button {
        border: 1px solid var(--line);
        background: #1f2937;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
      }

      button:hover {
        border-color: #4b5563;
      }

      pre {
        margin-top: 16px;
        padding: 14px;
        border-radius: 12px;
        background: #0b1020;
        border: 1px solid var(--line);
        overflow: auto;
        color: #c9d1d9;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>AGI Voice V3 shell is running</h1>
      <p>
        The Vite frontend is not available yet, so this fallback page keeps the desktop shell usable.
      </p>
      <p>
        Expected frontend: <code>http://localhost:4173</code>
      </p>
      <p>
        Expected backend: <code>http://127.0.0.1:8000</code>
      </p>
      <div class="row">
        <button id="ping">Ping backend</button>
        <button id="snapshot">Window snapshot</button>
        <button id="show">Show window</button>
      </div>
      <pre id="output">Ready.</pre>
    </main>
    <script>
      const output = document.getElementById('output');
      const render = (value) => {
        output.textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
      };

      document.getElementById('ping').addEventListener('click', async () => {
        render(await window.desktop.backend.ping());
      });

      document.getElementById('snapshot').addEventListener('click', async () => {
        render(await window.desktop.window.snapshot());
      });

      document.getElementById('show').addEventListener('click', async () => {
        await window.desktop.window.show();
        render('window:show invoked');
      });

      window.desktop.window.onEvent((event) => {
        render(event);
      });
    </script>
  </body>
</html>
